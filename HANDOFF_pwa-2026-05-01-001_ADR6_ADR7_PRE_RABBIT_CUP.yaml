# ─────────────────────────────────────────────────────────────────────────────
# §4  FIRST-PRINCIPLES VERDICT
# ─────────────────────────────────────────────────────────────────────────────
verdict: |
  The PWA closed the GEO COPY ratchet (ADR-6) but fails the GEO STRUCTURAL
  ratchet — entity cues live inside a 'use client' component without JSON-LD,
  robots/sitemap, semantic heading hierarchy, or next/image optimization, so
  the 37→50+ entity-score floor lands on paper while being throttled at the
  crawler boundary.

  On the ADR-7 axis, the PWA is architecturally severed from the autonomous-
  Telegram-HITL action-lifecycle pipeline the backend was built for: no
  booking form to emit a dedupe-able event, no UTM/start-param attribution,
  no partner-aware theming, no event landing at T-8 days. Both ADRs land
  their layers but stall at the PWA seam.

four_first_principles_moves:
  M-1:
    move: "Split page.tsx into server-rendered indexable shell + small client islands"
    unblocks: [G-1, G-4, G-6, G-9]
    risk: "low — Next 14 supports this natively; QR + menu state easily isolatable"
  M-2:
    move: "Ship /rabbit-cup + booking POST + E.164 idempotency on the client"
    unblocks: [P-2, P-3, P-6, P-8]
    risk: "medium — couples PWA to backend action-lifecycle endpoint contract;
           confirm endpoint shape with audit-writer.live.ts maintainer"
  M-3:
    move: "Bake JSON-LD + robots + sitemap + OG + next/image"
    unblocks: [G-2, G-3, G-5, G-7]
    risk: "low — pure additive, no behavior change"
  M-4:
    move: "Introduce v_partner_public_config read-only view; PWA reads partner
           identity by URL parameter, not by hardcoded brand constants"
    unblocks: [P-1, P-4, P-5, P-7, P-9]
    risk: "medium — requires Supabase RLS audit (public RO view must not leak
           internal partnership state); mirrors hitl_operator_config schema"

