# ─────────────────────────────────────────────────────────────────────────────
# §2  GAP MATRIX  (severity-ranked)
# ─────────────────────────────────────────────────────────────────────────────
adr6_geo_readiness_gaps:
  G-1:
    severity: BLOCKER
    surface: "app/page.tsx:1"
    finding: "'use client' nullifies indexing for non-JS-executing crawlers
              (GPTBot, ClaudeBot, PerplexityBot)."
    fix_principle: "Server-render the indexable shell; isolate state into
                    client islands (<MobileMenu/>, <TelegramQR/>)."
    falsifiable_test: "curl -A 'GPTBot' https://… | grep -c 'bio-energetic
                       therapy' must equal copy occurrences."
  G-2:
    severity: BLOCKER
    surface: "app/layout.tsx (metadata)"
    finding: "Zero JSON-LD. No LocalBusiness/MedicalProcedure/Person/Place/
              Product/FAQPage. Highest single GEO ROI."
    fix_principle: "Inline <script type='application/ld+json'> in layout via
                    Next 14 metadata. Min set: LocalBusiness + MedicalProcedure
                    + Person(Arie) + FAQPage."
    falsifiable_test: "Google Rich Results Test passes for all 4 types."
  G-3:
    severity: BLOCKER
    finding: "No robots.txt, no sitemap.xml."
    fix_principle: "app/robots.ts + app/sitemap.ts (Next 14 file conventions)."
    falsifiable_test: "GET /robots.txt and /sitemap.xml return 200."
  G-4:
    severity: MAJOR
    finding: "PEMF comparison table has no <caption>; stats section has no heading."
    fix_principle: "<caption>'DR MAGfield vs PEMF: Differentiation Matrix'</caption>
                    + <h2>Therapy Session Load Profile</h2> on stats."
  G-5:
    severity: MAJOR
    finding: "Raw <img> bypasses next/image. LCP candidate not prioritized.
              next.config.js does not whitelist lh3.googleusercontent.com."
    fix_principle: "Whitelist Stitch CDN, swap to <Image priority/> on hero,
                    rehost critical imgs to /public to drop CDN dependency."
    falsifiable_test: "Lighthouse LCP ≤ 2.5s on slow-4G simulated."
  G-6:
    severity: MAJOR
    finding: "Image alts too thin for entity extraction."
    fix_principle: "Entity-rich alts + <figcaption> on product photos."
  G-7:
    severity: MAJOR
    finding: "Open Graph incomplete; no Twitter card. WhatsApp/Messenger
              previews — Arie's actual distribution channel — render generic."
    fix_principle: "Full openGraph + twitter blocks; 1200×630 OG image."
  G-8:
    severity: MODERATE
    finding: "Manifest declared, no service worker. theme_color contradicts
              viewport.themeColor (#1A1A1A vs #F9F7F2)."
    fix_principle: "next-pwa or hand-rolled app/sw.ts; align to brand cream."
  G-9:
    severity: MODERATE
    finding: "4 font families render-blocking from fonts.googleapis.com,
              no font-display:swap."
    fix_principle: "next/font/google self-host + subsetting; drop unused weights."
  G-10:
    severity: MODERATE
    finding: "lang='en' only; brand targets MY+CN demo with 旋磁疗法 keyword."
    fix_principle: "<html lang='en-MY'> + alternates.languages once /zh exists."
  G-11:
    severity: MINOR
    finding: "No analytics. ADR-7 demands per-partner conversion measurement —
              impossible without GA4/PostHog and ?utm_* capture."
    fix_principle: "Lightweight PostHog init + UTM beacon at first paint."

adr7_partnership_hitl_gaps:
  P-1:
    severity: BLOCKER
    surface: "app/page.tsx:9 (BRAND_WHATSAPP), CTA links throughout"
    finding: "wa.me has no ?text=, tel: is naked. Rabbit Cup tap is
              indistinguishable from organic. Backend cannot attribute."
    fix_principle: "?text=Hi%20Arie...%20Source%3A%20{utm_source}; capture UTM
                    into session beacon for tel:."
  P-2:
    severity: BLOCKER
    finding: "No booking form. PWA cannot emit canonical action-lifecycle event.
              Idempotent lookupReplay (audit-writer.live.ts) never fires from
              PWA path."
    fix_principle: "Add /book form (name, phone, partner-source, slot) → POST
                    app.longevityvalley.ai/api/.../action-lifecycle → redirect
                    to wa.me with prefilled context."
    falsifiable_test: "tool_audit_trail row exists with idempotency_key
                       'rabbit-cup-2026:+60{phone}' for each test booking."
  P-3:
    severity: BLOCKER
    finding: "No partner-aware landing. Tent QR will land on generic /."
    fix_principle: "/rabbit-cup (or dynamic /p/[partnership_id]) server
                    component reading searchParams; partner badge + event-bound
                    Telegram start param."
  P-4:
    severity: BLOCKER
    finding: "BRAND_WHATSAPP hardcoded. ADR-7 says scale to 1000s of partners —
              architecture cannot serve N>1 without code change."
    fix_principle: "Public RO Supabase view v_partner_public_config(whatsapp,
                    telegram_start_param, banner_color, partner_name) keyed by
                    partnership_id. Mirrors backend hitl_operator_config."
    falsifiable_test: "Adding a 2nd partnership row + visiting
                       /?utm_source=partner_2 swaps phone + colors with zero
                       code deploy."
  P-5:
    severity: MAJOR
    finding: "Telegram start param hardcoded ?start=krpm — must be
              ?start={partnership_id}-{event_id} for hitl_operator_config
              routing."
    fix_principle: "Compute start param at render from URL/cookie."
  P-6:
    severity: MAJOR
    finding: "No client-side phone normalization. Backend idempotency key
              needs E.164. User input '012-659 5319' creates duplicate
              audit rows."
    fix_principle: "lib/phone.ts with libphonenumber-js; submit only canonical
                    E.164. Mirrors normalize_phone() in canon/audit-writer."
  P-7:
    severity: MAJOR
    finding: "Bottom-nav 'Qi Mini' tab opens WhatsApp instead of product info."
    fix_principle: "Either anchor to product showcase, or build /qi-master and
                    /qi-mini routes (also adds ADR-6 entity-coverage URL surface)."
  P-8:
    severity: MAJOR
    finding: "No event route at T-8 days. Rabbit Cup needs /rabbit-cup with
              event hero, partner brand, slot picker, capped capacity counter."
    fix_principle: "app/rabbit-cup/page.tsx — highest immediate ROI."
  P-9:
    severity: MODERATE
    finding: "After WA hand-off the user loses the loop. ADR-7's HITL
              (Arie taps Telegram button) is invisible to the booking user."
    fix_principle: "/booking/confirmed?token=… polling /api/booking/status until
                    HITL confirmation lands; soft confirmation badge."
  P-10:
    severity: MODERATE
    finding: "No service worker → repeat KRPM members lose install benefit
              (offline shell, push)."
    fix_principle: "next-pwa + push subscription on second visit."
  P-11:
    severity: MINOR
    finding: "Manifest has no share_target. Members forwarding stories should
              'Share to DR MAGfield' → opens booking. Under-used virality moat."
    fix_principle: "Add share_target to manifest.json."

